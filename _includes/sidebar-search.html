
<h3>Search</h3>
{% assign search_asset_version = site.time | date: '%s' %}
<div id="site_search"
     data-search-index="{{ '/assets/search_data.json' | relative_url }}?v={{ search_asset_version }}"
     data-search-limit="{{ site.simple_jekyll_search.limit | default: 10 }}">
    <input type="search" id="search_box" placeholder="LC#/Tag/Name/Keyword" autocomplete="off">
</div>

<ul id="search_results" aria-live="polite"></ul>

<link rel="stylesheet" type="text/css" href="{{ '/assets/css/modules/sidebar-search.css' | relative_url }}">
<script src="{{ '/assets/js/search.js' | relative_url }}?v={{ search_asset_version }}"></script>
